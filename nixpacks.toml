[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["DJANGO_SETTINGS_MODULE=core.settings PYTHONPATH=backend python manage.py collectstatic --noinput"]

[start]
cmd = "DJANGO_SETTINGS_MODULE=core.settings PYTHONPATH=backend python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --chdir backend"
