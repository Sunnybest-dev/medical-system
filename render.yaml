services:
  # ── Django Backend ──────────────────────────────────────────────
  - type: web
    name: mediai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mediai-frontend.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: mediai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mediai-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Redis ────────────────────────────────────────────────────────
  - type: redis
    name: mediai-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────
  - name: mediai-db
    plan: free
    databaseName: mediai_db
    user: mediai_user
